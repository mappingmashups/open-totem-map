<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>OpenTotemMap</title>
    <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@2.1.7/dist/maplibre-gl.css'><link rel="stylesheet" href="./style.css">

  </head>
  <style>
    .map-overlay {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(255, 255, 255, 0.9);
        padding: 10px;
        border-radius: 4px;
        font-family: sans-serif;
        z-index: 1;
    }
  </style>
  <body>
    <div class="map-legend">
      <div class="legend-title">OpenTotemMap</div>
      <div class="legend-subtitle">Totem poles from the OpenStreetMap database.<br><a href="https://github.com/mappingmashups/open-totem-map" target="_blank" rel="noopener">Learn more</a></div>
      <div class="legend-item"><span class="legend-swatch legend-swatch-green"></span><span>artwork_type=totem_pole</span></div>
      <div class="legend-item"><span class="legend-swatch legend-swatch-orange"></span><span>other totem pole tags</span></div>
      <div class="legend-item"><span class="legend-swatch legend-swatch-gray"></span><span>possible totem poles (need confirmation)</span></div>
    </div>
    <div id="maplibre-map"></div>
    <script src='https://unpkg.com/maplibre-gl@5.2.0/dist/maplibre-gl.js'></script><script  src="./script.js"></script>

  </body>

</html>
